<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<div class="card">

<img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" class="logo">

<h2>GitHub Issues Tracker</h2>

<p class="subtitle">Sign in to manage your issues</p>

<label>Username</label>
<input type="text" id="username" placeholder="Enter Username">
<div class="default">Default: admin</div>

<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">
<div class="default">Default: admin123</div>

<button onclick="login()">Sign In</button>

<div class="divider">
<hr>
<span>OR</span>
<hr>
</div>

<p class="demo-title">Demo Credentials:</p>

<div class="demo">
<b>Username:</b> admin <br>
<b>Password:</b> admin123
</div>

</div>

<script src="login.js"></script>

</body>
</html>
